workflows:
  ios-release:
    name: PolyArticle iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: v18
      xcode: 15.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rohan.flashfeed2

    cache:
      cache_paths:
        - ~/.npm
        - ios/Pods

    scripts:
      - name: Install dependencies
        script: npm ci || npm install

      - name: Expo Prebuild
        script: npx expo prebuild --clean --platform ios

      - name: Pod Install
        script: |
          cd ios && pod install --repo-update

      - name: Inject AdMob ID
        script: |
          /usr/libexec/PlistBuddy -c \
          "Add :GADApplicationIdentifier string ca-app-pub-2345974289373242~2759641888" \
          ios/PolyArticle/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
          "Set :GADApplicationIdentifier ca-app-pub-2345974289373242~2759641888" \
          ios/PolyArticle/Info.plist

      - name: Create Export Options
        script: |
          cat > ios/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/PolyArticle.xcworkspace \
            --scheme PolyArticle \
            --config Release \
            --export-options-plist ios/exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - rohanbanodiya@gmail.com
        notify:
          success: true
          failure: true